<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="shortcut icon" href="https://res.cloudinary.com/dw2eqq9kk/image/upload/v1780068838/favicon_kszowj.ico" type="image/x-icon">
    
    <link rel="stylesheet" href="/assets/css/base.css">
    <link rel="stylesheet" href="/assets/css/confirmToken.css">

    <title>Alterar Senha - Dicionário de Estudos</title>
</head>
<body>
    <div class="snackbars-box"></div>

    <main class="fade-in-up" id="changePassword">
        <a href="/auth/login" class="back-button">
            <i data-icon="returnArrow"></i>
            <span>Voltar</span>
        </a>

        <div class="hero">
            <div class="main-title">
                <h1>Alterar Senha</h1>
            </div>

            <div class="top">
                <div class="subtitle">
                    <p>
                        Código de verificação gerado na criação da conta ou na opção <em>“gerar novo código de verificação”</em> nas configurações de sua conta.
                    </p>
                    <p>Após alterar senha um <strong>novo código de verificação será gerado</strong>.</p>
                </div>
            </div>

            <form action="#" class="bottom">
                <fieldset class="input-fieldset">
                    <legend class="label">Nome de Usuário</legend>
                    <input type="text" name="username" id="iusername" class="input" placeholder="Nome de usuário aqui" minlength="8" required autofocus>
                </fieldset>

                <fieldset class="input-fieldset">
                    <legend class="label">Código de Verificação</legend>
                    <input type="text" name="userToken" id="iuserToken" class="input" placeholder="Código de 16 dígitos" minlength="16" maxlength="16" autocapitalize="characters" autocomplete="off" required>
                </fieldset>

                <fieldset class="input-fieldset">
                    <legend class="label">Nova Senha</legend>
                    <input type="password" name="password" id="inewPassword" class="input" placeholder="********" minlength="4" autocomplete="current-password" required>
                </fieldset>

                <button type="submit" class="btn submit">
                    <span>Confirmar Código</span>
                    <div class="spinning-wheel"></div>
                </button>
            </form>
        </div>
    </main>

    <script type="module" src="/assets/js/init.js"></script>
    <script type="module" src="/assets/js/base.js"></script>
    <script type="module" src="/assets/js/auth/changePassword.js"></script>
    <script src="/assets/js/toggleTheme.js"></script>
</body>
</html>
