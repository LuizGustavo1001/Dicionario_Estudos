<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="shortcut icon" href="https://res.cloudinary.com/dw2eqq9kk/image/upload/v1780068838/favicon_kszowj.ico" type="image/x-icon">

    <link rel="stylesheet" href="/assets/css/base.css">
    <link rel="stylesheet" href="/assets/css/auth.css">

    <title>Login - Dicionário de Estudos</title>
</head>
<body>
    <div class="snackbars-box"></div>

    <main class="fade-in-up login">
        <section class="auth-image-box">
            <i data-icon="brandLogo" class="brand-logo"></i>
            <div class="image-title regular-title">
                <h1>Dicionário de Estudos</h1>
                <p>Armazene termos e seus significados em um único lugar</p>
            </div>
        </section>

        <section class="hero">
            <div class="hero-container">
                <div class="main-title regular-title">
                    <h1>Bem-vindo de volta!</h1>
                    <p>Autentique-se para continuar</p>
                </div>
                <form action="#" method="POST">
                    <div class="form-input-box input-box-w-label">
                        <label for="iuserName">Nome de Usuário</label>
                        <input type="text" name="userName" id="iuserName" class="input" placeholder="Nome de usuário aqui" maxlength="30" minlength="8" autocomplete="username" required  autofocus>
                    </div>
                    <div class="form-input-box input-box-w-label">
                        <label for="ipassword">Senha</label>
                        <input type="password" name="password" id="ipassword" class="input" placeholder="********" minlength="4" autocomplete="current-password" required>
                    </div>
                    <button type="submit" class="btn submit">Entrar</button>
                </form>
                <footer>
                    <p>Esqueceu sua senha? <a href="/auth/changePassword/">Clique aqui!</a></p>
                </footer>
            </div>

            <div class="pages-nav">
                <a href="/auth/login" class="btn">Login</a>
                <a href="/auth/register" class="btn btn--just-text">Criar Conta</a>
            </div>
        </section>

    </main>
    <nav class="dev-info">
        <a href="https://github.com/LuizGustavo1001" class="icon-hold" rel="external" target="_blank">
            <i data-icon="github"></i>
        </a>
        <a href="https://www.linkedin.com/in/luizgustavo1001/" class="icon-hold" rel="external" target="_blank">
            <i data-icon="linkedin"></i>
        </a>
    </nav>
    
    <script type="module" src="/assets/js/base.js"></script>
    <script type="module" src="/assets/js/auth/login.js"></script>

    <script src="/assets/js/toggleTheme.js"></script>
</body>
</html>
