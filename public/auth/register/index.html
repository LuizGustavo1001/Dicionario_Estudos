<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <link rel="shortcut icon" href="https://res.cloudinary.com/dw2eqq9kk/image/upload/v1778030830/favicon_pywkaw.ico" type="image/x-icon">
    
    <link rel="stylesheet" href="/assets/css/base.css">
    <link rel="stylesheet" href="/assets/css/auth.css">

    <title>Registro - Dicionário de Estudos</title>
</head>
<body>
    <div class="snackbars-box">
        <!--
        <div class="snackbar">
            <span class="vertical-line"></span>
            <span class="snackbar-text">Erro: Funcionalidade ainda em desenvolvimento Lorem ipsum dolor, sit amet consectetur adipisicing elit. Eum soluta inventore aliquam excepturi consequuntur dolorum fugit temporibus laudantium consectetur commodi quod quis odio possimus veritatis sequi, fuga, neque esse iste.</span>
        </div>

        <div class="snackbar success">
            <span class="vertical-line"></span>
            <span class="snackbar-text">Erro: Funcionalidade ainda em desenvolvimento</span>
        </div>
        -->
    </div>

    <main class="fade-in-up register">
        <section class="auth-image-box tablet">
            <nav class="dev-info">
                <a href="https://github.com/LuizGustavo1001" class="icon-hold secondary" rel="external" target="_blank">
                    <i data-icon="github"></i>
                </a>
                <a href="https://www.linkedin.com/in/luizgustavo1001/" class="icon-hold secondary" rel="external" target="_blank">
                    <i data-icon="linkedin"></i>
                </a>
            </nav>
            <i data-icon="brandLogo" class="brand-logo"></i>
            <div class="image-title regular-title">
                <h1>Dicionário de Estudos</h1>
                <p>Armazene termos e seus significados em um único lugar</p>
            </div>
        </section>

        <section class="hero">
            <div class="hero-container">
                <div class="main-title regular-title">
                    <h1>Bem-vindo!</h1>
                    <p>Registre-se para começar o seu dicionário.</p>
                </div>
                <form action="#" method="POST">
                    <div class="form-input-box input-box-w-label">
                        <label for="iuserName">Nome de Usuário</label>
                        <input type="text" name="userName" id="iuserName" class="input" placeholder="Nome de usuário aqui" maxlength="30" minlength="8" autocomplete="username" autocapitalize="words" autofocus required>
                    </div>

                    <div class="form-input-box input-box-w-label">
                        <label for="ipassword">Senha</label>
                        <input type="password" name="password" id="ipassword" class="input" placeholder="********" minlength="4" autocomplete="current-password" required>
                    </div>
                    <button type="submit" class="btn submit">Registrar</button>
                </form>
            </div>

            <div class="pages-nav">
                <a href="/auth/login" class="btn btn--just-text">Login</a>
                <a href="/auth/register" class="btn">Registro</a>
            </div>
        </section>
    </main>

    <script type="module" src="/assets/js/base.js"></script>
    <script type="module" src="/assets/js/auth/register.js"></script>

    <script src="/assets/js/toggleTheme.js"></script>
</body>
</html>
