<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <style>
        .clr-circle{
            width: 20px;
            height: 20px;

            background: var(--clr, black);
            border: 2px solid transparent;
            border-radius: 50px;
            cursor: pointer;
        }

        .clr-circle:hover,
        .clr-circle.selected{
            border-color: rgb(2, 31, 57);
        }

        body{
            display: flex;
            align-items: center;
            gap: 1em;
        }

        #icolor{
            border: none;
            padding: 0;
            
            cursor: pointer;
            border-radius: 4px;
        }
        
    </style>

</head>
<body>
    
    <div class="clr-circle selected" style="--clr: #C785EE" data-color="#C785EE"></div>
    <div class="clr-circle" style="--clr: #EA7B7B" data-color="#EA7B7B"></div>
    <div class="clr-circle" style="--clr: #C5D89D" data-color="#C5D89D"></div>
    <div class="clr-circle" style="--clr: #AAC4F5" data-color="#AAC4F5"></div>
    <div class="clr-circle" style="--clr: #EDA35A" data-color="#EDA35A"></div>
    <div class="clr-circle" style="--clr: #EF8CB9" data-color="#EF8CB9"></div>

    <input type="color" name="color" id="icolor" value="#C785EE">

    <script>
        const circles = document.querySelectorAll(".clr-circle")
        const colorInput = document.querySelector("#icolor")
        circles.forEach(circle => {
            circle.addEventListener("click", () => {changeColor(circle.dataset.color)})
        })

        // match input with the clr-circle
        colorInput.addEventListener("input", (e) => {
            const chosenColor = e.target.value.toUpperCase()

            circles.forEach(circle => {
                circle.classList.toggle("selected", circle.dataset.color.toUpperCase() === chosenColor)
            })
        })

        function changeColor(color){
            circles.forEach(circle => {
                circle.classList.toggle("selected", circle.dataset.color === color)
            })
            colorInput.value = color
        }
    </script>
</body>
</html>
